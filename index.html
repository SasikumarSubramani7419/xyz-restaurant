<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XYZ Restaurant | Pro Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0e0c;--surface:rgba(26, 24, 20, 0.95);--card:#221f1a;--border:#2e2a23;--gold:#d4a847;--gold-light:#f0c96a;--red:#c94040;--green:#3a9e6f;--text:#f0ebe0;--muted:#7a7060;--radius:20px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden;}
    
    /* Dynamic Background */
    body::before{content:'';position:fixed;width:600px;height:600px;background:var(--gold);filter:blur(150px);opacity:0.07;top:-200px;left:-200px;pointer-events:none;}
    
    .app{position:relative;z-index:1;width:100%;max-width:480px;}
    .screen{display:none;animation:fadeUp 0.5s cubic-bezier(.22,.68,0,1.2) both;}
    .screen.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    
    .card{background:var(--surface);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:25px;box-shadow:0 25px 50px rgba(0,0,0,0.5);}
    
    /* Header & Navigation */
    .restaurant-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--gold);text-align:center;}
    .cart-btn-float{position:fixed;bottom:30px;right:30px;background:var(--gold);color:#1a1200;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 10px 30px rgba(212,168,71,0.4);cursor:pointer;z-index:100;}
    .cart-count-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:white;font-size:0.7rem;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;}

    /* Menu & Lists */
    .search-box{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);padding:14px;border-radius:12px;color:var(--text);margin-bottom:15px;outline:none;}
    .menu-grid{display:grid;gap:12px;max-height:380px;overflow-y:auto;padding-right:5px;}
    .menu-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:15px;padding:12px;display:flex;align-items:center;justify-content:space-between;transition:0.3s;}
    .item-img{width:60px;height:60px;border-radius:12px;object-fit:cover;}
    
    /* Buttons */
    .btn{width:100%;padding:16px;border-radius:14px;border:none;font-weight:600;cursor:pointer;margin-top:10px;transition:0.2s;}
    .btn-primary{background:linear-gradient(135deg,var(--gold),#b8902e);color:#1a1200;}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
    .add-btn{background:var(--gold);color:#1a1200;padding:8px 16px;border-radius:10px;font-weight:bold;border:none;cursor:pointer;}
    .qty-controls{display:flex;align-items:center;gap:15px;background:var(--bg);padding:6px 12px;border-radius:10px;border:1px solid var(--border);}
    
    /* Progress & Rating */
    .progress-container{width:100%;background:var(--border);height:6px;border-radius:10px;margin:15px 0;overflow:hidden;}
    .progress-bar{width:0%;height:100%;background:var(--gold);transition:width 1s linear;}
    .star-rating{display:flex;justify-content:center;gap:10px;margin:15px 0;}
    .star{font-size:1.8rem;color:var(--muted);cursor:pointer;transition:0.2s;}
    .star.selected{color:var(--gold);}

    /* History */
    .history-tag{font-size:0.7rem;background:var(--border);padding:2px 8px;border-radius:4px;color:var(--gold-light);margin-top:4px;display:inline-block;}
    
    input { width:100%; padding:14px; background:rgba(0,0,0,0.2); border:1px solid var(--border); color:white; border-radius:10px; margin-bottom:12px;}
    .summary-box{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:15px;padding:15px;margin:15px 0;}
  </style>
</head>
<body>

<div class="cart-btn-float" id="cart-trigger" onclick="goTo('screen-cart')" style="display:none;">
  🛒<div class="cart-count-badge" id="cart-count">0</div>
</div>

<div class="app">
 
  <div class="screen active" id="screen-welcome">
    <div class="card" style="text-align:center;">
      <div class="logo-wrap">
        <span style="font-size:3.5rem">✨</span>
        <div class="restaurant-name">XYZ Restaurant</div>
        <p style="color:var(--muted); letter-spacing:3px; font-size:0.7rem; margin-top:5px;">A TASTE OF LUXURY</p>
      </div>
      <button class="btn btn-primary" onclick="goTo('screen-menu')" style="width:70px; height:70px; border-radius:50%; font-size:1.3rem; margin:20px auto; display:block;">5</button>
      <div id="prev-orders-list" style="margin-top:30px; text-align:left;"></div>
    </div>
  </div>
 
  <div class="screen" id="screen-menu">
    <div class="card">
      <h3 style="margin-bottom:20px; font-family:'Playfair Display'">Select Your Menu</h3>
      <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px; cursor:pointer; margin-bottom:15px; border:1px solid var(--border);" onclick="openMenu('veg')">🥗 <b>Green Earth (Veg)</b></div>
      <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px; cursor:pointer; border:1px solid var(--border);" onclick="openMenu('nonveg')">🍗 <b>Meat & Grill (Non-Veg)</b></div>
      <button class="btn btn-ghost" onclick="goTo('screen-welcome')">Back Home</button>
    </div>
  </div>
 
  <div class="screen" id="screen-items">
    <div class="card">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
        <button onclick="goTo('screen-menu')" style="background:none; border:none; color:var(--gold); cursor:pointer">← Menu</button>
        <span id="cat-label" style="font-weight:bold; letter-spacing:1px; color:var(--gold)"></span>
      </div>
      <input type="text" class="search-box" id="item-search" placeholder="What are you craving?" oninput="filterSearch()">
      <div class="menu-grid" id="items-grid"></div>
    </div>
  </div>
 
  <div class="screen" id="screen-cart">
    <div class="card">
      <h3 style="margin-bottom:15px; font-family:'Playfair Display'">Order Summary</h3>
      <div id="cart-list"></div>
      <div class="summary-box" id="cart-summary"></div>
      <button class="btn btn-primary" onclick="goTo('screen-payment')">Confirm Payment</button>
      <button class="btn btn-ghost" onclick="goTo('screen-items')">Add More Items</button>
    </div>
  </div>

  <div class="screen" id="screen-payment">
    <div class="card">
      <h3 style="margin-bottom:15px;">Secure Checkout</h3>
      <input type="text" id="p-name" placeholder="Cardholder Name">
      <input type="text" id="p-card" placeholder="12345 (Test Card)">
      <input type="password" id="p-pin" placeholder="1234 (Test PIN)">
      <button class="btn btn-primary" id="pay-btn" onclick="handlePayment()">Pay Securely</button>
      <button class="btn btn-ghost" onclick="goTo('screen-cart')">Cancel</button>
    </div>
  </div>

  <div class="screen" id="screen-success">
    <div class="card" style="text-align:center;">
      <div id="status-icon" style="font-size:3rem">⏳</div>
      <h2 id="status-title" style="margin:10px 0;">Preparing...</h2>
      <div id="order-tracking-ui"></div>
      <div id="feedback-ui" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
        <p>How was your experience?</p>
        <div class="star-rating">
          <span class="star" onclick="rate(1)">★</span>
          <span class="star" onclick="rate(2)">★</span>
          <span class="star" onclick="rate(3)">★</span>
          <span class="star" onclick="rate(4)">★</span>
          <span class="star" onclick="rate(5)">★</span>
        </div>
        <button class="btn btn-primary" onclick="location.reload()">Finish</button>
      </div>
    </div>
  </div>

</div>

<script>
  const DATA = {
    veg: [
      { id: 1, name: 'Truffle Paneer', price: 280, img: 'https://images.unsplash.com/photo-1567184109411-47a7a39485ed?w=200' },
      { id: 2, name: 'Avocado Dosa', price: 150, img: 'https://images.unsplash.com/photo-1543353071-087092ec393a?w=200' },
      { id: 3, name: 'Saffron Pulao', price: 190, img: 'https://images.unsplash.com/photo-1563379091339-03b21bc4a4f8?w=200' }
    ],
    nonveg: [
      { id: 4, name: 'Royal Biryani', price: 320, img: 'https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=200' },
      { id: 5, name: 'Butter Chicken', price: 350, img: 'https://images.unsplash.com/photo-1545240103-121f29100272?w=200' },
      { id: 6, name: 'Grilled Salmon', price: 580, img: 'https://images.unsplash.com/photo-1599043513900-ed6fe01d3833?w=200' }
    ]
  };

  let cart = JSON.parse(localStorage.getItem('restaurant_cart')) || [];
  let history = JSON.parse(localStorage.getItem('order_history')) || [];
  let currentCategory = 'veg';

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'screen-welcome') renderHistory();
    updateUI();
  }

  function openMenu(cat) {
    currentCategory = cat;
    document.getElementById('cat-label').textContent = cat.toUpperCase();
    filterSearch();
    goTo('screen-items');
  }

  function filterSearch() {
    const query = document.getElementById('item-search').value.toLowerCase();
    const grid = document.getElementById('items-grid');
    grid.innerHTML = '';
    
    DATA[currentCategory].forEach(item => {
      if (item.name.toLowerCase().includes(query)) {
        const cartItem = cart.find(c => c.id === item.id);
        const qty = cartItem ? cartItem.qty : 0;
        grid.innerHTML += `
          <div class="menu-item">
            <div style="display:flex; align-items:center; gap:12px;">
              <img src="${item.img}" class="item-img">
              <div><b>${item.name}</b><br><small>₹${item.price}</small></div>
            </div>
            ${qty > 0 ? `<div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
              <span>${qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>` : `<button class="add-btn" onclick="addToCart(${item.id})">ADD</button>`}
          </div>
        `;
      }
    });
  }

  function addToCart(id) {
    const item = DATA[currentCategory].find(i => i.id === id);
    cart.push({ ...item, qty: 1 });
    save();
    filterSearch();
  }

  function changeQty(id, delta) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx > -1) {
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) cart.splice(idx, 1);
    }
    save();
    if (document.getElementById('screen-items').classList.contains('active')) filterSearch();
    else updateUI();
  }

  function save() {
    localStorage.setItem('restaurant_cart', JSON.stringify(cart));
    updateUI();
  }

  function updateUI() {
    const count = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cart-trigger').style.display = count > 0 ? 'flex' : 'none';
    document.getElementById('cart-count').textContent = count;

    if (document.getElementById('screen-cart').classList.contains('active')) {
      const list = document.getElementById('cart-list');
      const summ = document.getElementById('cart-summary');
      list.innerHTML = cart.length ? '' : '<p style="text-align:center; color:var(--muted)">Cart is empty</p>';
      let sub = 0;
      cart.forEach(item => {
        sub += (item.price * item.qty);
        list.innerHTML += `<div class="menu-item" style="margin-bottom:10px; border:none; background:none;"><span>${item.name} x ${item.qty}</span><b>₹${item.price * item.qty}</b></div>`;
      });
      const gst = Math.round(sub * 0.05);
      summ.innerHTML = `<div class="summary-row"><span>Subtotal</span><span>₹${sub}</span></div><div class="summary-row"><span>GST (5%)</span><span>₹${gst}</span></div><div class="summary-row total-row"><span>Payable</span><span>₹${sub + gst}</span></div>`;
    }
  }

  function handlePayment() {
    const n = document.getElementById('p-name').value;
    const c = document.getElementById('p-card').value;
    const p = document.getElementById('p-pin').value;
    if (n && c === '12345' && p === '1234') {
      const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
      history.push({ name: cart[0].name + (cart.length > 1 ? '...' : ''), total: Math.round(total*1.05), date: new Date().toLocaleDateString() });
      localStorage.setItem('order_history', JSON.stringify(history));
      
      document.getElementById('pay-btn').innerHTML = "Authorizing...";
      setTimeout(() => {
        document.getElementById('order-tracking-ui').innerHTML = `
          <div class="summary-box">
            <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
            <p id="t-text" style="color:var(--gold)">Cooking: 10:00</p>
          </div>
        `;
        let time = 10; // Test mode: 10 seconds. Increase for real use.
        let bar = document.getElementById('p-bar');
        let txt = document.getElementById('t-text');
        
        const timer = setInterval(() => {
          time--;
          bar.style.width = ((10 - time) / 10 * 100) + "%";
          txt.textContent = `Arriving in: ${time}s`;
          if (time <= 0) {
            clearInterval(timer);
            document.getElementById('status-icon').textContent = "🍱";
            document.getElementById('status-title').textContent = "Food is Ready!";
            document.getElementById('status-title').style.color = "var(--green)";
            document.getElementById('feedback-ui').style.display = "block";
          }
        }, 1000);
        cart = []; localStorage.removeItem('restaurant_cart'); goTo('screen-success');
      }, 1500);
    } else alert("Invalid Card Details!");
  }

  function renderHistory() {
    const hList = document.getElementById('prev-orders-list');
    if(history.length === 0) return;
    hList.innerHTML = '<p style="color:var(--muted); font-size:0.8rem; margin-bottom:10px;">PREVIOUS ORDERS</p>';
    history.slice(-2).reverse().forEach(ord => {
      hList.innerHTML += `<div class="menu-item" style="margin-bottom:8px; opacity:0.8;"><div><b>${ord.name}</b><br><small>${ord.date}</small></div><b>₹${ord.total}</b></div>`;
    });
  }

  function rate(n) {
    document.querySelectorAll('.star').forEach((s, idx) => {
      s.classList.toggle('selected', idx < n);
    });
  }

  window.onload = () => { renderHistory(); updateUI(); };
</script>
</body>
</html>
