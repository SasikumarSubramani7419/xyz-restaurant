<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYZ Restaurant</title>
<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center}
.screen{display:none}
.screen.active{display:block}
.menu-item{padding:10px;border:1px solid #444;margin:5px;cursor:pointer}
.btn{padding:10px 20px;margin:10px;cursor:pointer}
</style>
</head>
<body>

<!-- SCREEN 1 -->
<div class="screen active" id="screen-welcome">
<h1>XYZ Restaurant</h1>
<button onclick="goTo('screen-menu')" class="btn">Start</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen-menu">
<h2>Choose Category</h2>
<button onclick="selectCategory('veg')" class="btn">Veg</button>
<button onclick="selectCategory('nonveg')" class="btn">Non-Veg</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen-items">
<h2>Items</h2>
<div id="items-grid"></div>
<button onclick="goTo('screen-menu')" class="btn">Back</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="screen-qty">
<h2 id="prep-name"></h2>
<button onclick="changeQty(-1)">-</button>
<span id="qty-display">1</span>
<button onclick="changeQty(1)">+</button>
<br>
<button onclick="addToCart()" class="btn">Add To Cart</button>
<button onclick="goTo('screen-items')" class="btn">Back</button>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="screen-payment">
<h2>Payment</h2>
<p id="pay-item"></p>
<p>Total: <span id="pay-total"></span></p>
<input id="input-card" placeholder="card">
<input id="input-pin" placeholder="pin">
<br>
<button onclick="processPayment()" class="btn">Pay</button>
</div>

<!-- SUCCESS -->
<div class="screen" id="screen-success">
<h2>Success</h2>
<button onclick="resetApp()" class="btn">New Order</button>
</div>

<!-- FAIL -->
<div class="screen" id="screen-fail">
<h2>Failed</h2>
<button onclick="goTo('screen-payment')" class="btn">Retry</button>
</div>

<script>
const MENU={
veg:[
{name:'Idli',price:20,discount:0},
{name:'Vada',price:25,discount:10},
{name:'Chapati',price:15,discount:10}
],
nonveg:[
{name:'Chicken Biryani',price:120,discount:20},
{name:'Fish Curry',price:150,discount:15}
]
};

const state={
category:'',
cart:[],
currentItem:null,
qty:1,
finalTotal:0
};

function goTo(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function selectCategory(cat){
state.category=cat;
renderItems(MENU[cat]);
goTo('screen-items');
}

function renderItems(items){
const grid=document.getElementById('items-grid');
grid.innerHTML='';
items.forEach(item=>{
const div=document.createElement('div');
div.className='menu-item';
div.innerText=item.name+" ₹"+item.price;
div.onclick=()=>selectItem(item);
grid.appendChild(div);
});
}

function selectItem(item){
state.currentItem=item;
state.qty=1;
document.getElementById('prep-name').innerText=item.name;
document.getElementById('qty-display').innerText=1;
goTo('screen-qty');
}

function changeQty(d){
state.qty=Math.max(1,state.qty+d);
document.getElementById('qty-display').innerText=state.qty;
}

function addToCart(){
const item=state.currentItem;
const exist=state.cart.find(i=>i.name===item.name);
if(exist) exist.qty+=state.qty;
else state.cart.push({...item,qty:state.qty});
goTo('screen-items');
}

function calculateTotal(){
let t=0;
state.cart.forEach(i=>{
let sub=i.price*i.qty;
let disc=sub*i.discount/100;
t+=sub-disc;
});
state.finalTotal=Math.round(t);
}

function goToPayment(){
if(state.cart.length===0){alert("Cart empty");return;}
calculateTotal();
document.getElementById('pay-item').innerText=
state.cart.map(i=>i.name+" x"+i.qty).join(",");
document.getElementById('pay-total').innerText="₹"+state.finalTotal;
goTo('screen-payment');
}

function processPayment(){
const c=document.getElementById('input-card').value;
const p=document.getElementById('input-pin').value;
if(c==="12345"&&p==="1234") goTo('screen-success');
else goTo('screen-fail');
}

function resetApp(){
state.cart=[];
goTo('screen-welcome');
}
</script>

</body>
</html>
