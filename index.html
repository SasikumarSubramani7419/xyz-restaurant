<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XYZ Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{--bg:#0f0e0c;--surface:#1a1814;--card:#221f1a;--border:#2e2a23;--gold:#d4a847;--gold-light:#f0c96a;--red:#c94040;--green:#3a9e6f;--text:#f0ebe0;--muted:#7a7060;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;justify-content:center;padding:24px;}
.screen{display:none}
.screen.active{display:block}
.card{background:var(--card);border-radius:16px;padding:30px;width:480px}
.menu-item{background:var(--surface);padding:14px;border-radius:12px;margin-bottom:10px;cursor:pointer}
.btn{background:linear-gradient(135deg,var(--gold),#b8902e);border:none;padding:14px;border-radius:12px;width:100%;margin-top:10px}
.qty-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border)}
</style>
</head>

<body>

<div class="app">

<div class="screen active" id="screen-welcome">
<div class="card">
<h1>XYZ Restaurant</h1>
<button class="btn" onclick="goTo('screen-menu')">Start Order</button>
</div>
</div>

<div class="screen" id="screen-menu">
<div class="card">
<h2>Select Category</h2>
<button class="btn" onclick="selectCategory('veg')">Vegetarian</button>
<button class="btn" onclick="selectCategory('nonveg')">Non Vegetarian</button>
</div>
</div>

<div class="screen" id="screen-items">
<div class="card">
<h2>Select Item</h2>
<input id="search-input" oninput="filterItems()" placeholder="Search"/>
<div id="items-grid"></div>
<button class="btn" onclick="goToPayment()">Go Payment</button>
</div>
</div>

<div class="screen" id="screen-qty">
<div class="card">
<h2 id="prep-name"></h2>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty-display">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
<button class="btn" onclick="addToCart()">Add To Cart</button>
</div>
</div>

<div class="screen" id="screen-payment">
<div class="card">
<h2>Payment</h2>
<p id="pay-item"></p>
<p>Total ₹ <span id="pay-total"></span></p>
<input id="input-name" placeholder="name">
<input id="input-card" placeholder="card">
<input id="input-pin" placeholder="pin">
<button class="btn" onclick="processPayment()">Pay Now</button>
</div>
</div>

<div class="screen" id="screen-success">
<div class="card"><h2>Payment Success</h2></div>
</div>

<div class="screen" id="screen-fail">
<div class="card"><h2>Payment Failed</h2></div>
</div>

</div>

<script>
const MENU={
veg:[
{name:'Idli',price:20,discount:0},
{name:'Vada',price:25,discount:10},
{name:'Chapati',price:15,discount:10}
],
nonveg:[
{name:'Chicken Biryani',price:120,discount:20},
{name:'Fish Curry',price:150,discount:15}
]
};

const state={category:'',cart:[],currentItem:null,qty:1,finalTotal:0};

function goTo(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function selectCategory(cat){
state.category=cat;
renderItems(MENU[cat]);
goTo('screen-items');
}

function renderItems(items){
const grid=document.getElementById('items-grid');
grid.innerHTML='';
items.forEach(item=>{
const el=document.createElement('div');
el.className='menu-item';
el.innerText=item.name+" ₹"+item.price;
el.onclick=()=>selectItem(item);
grid.appendChild(el);
});
}

function filterItems(){
const q=document.getElementById('search-input').value.toLowerCase();
renderItems(MENU[state.category].filter(i=>i.name.toLowerCase().includes(q)));
}

function selectItem(item){
state.currentItem=item;
state.qty=1;
document.getElementById('prep-name').innerText=item.name;
document.getElementById('qty-display').innerText=1;
goTo('screen-qty');
}

function changeQty(d){
state.qty=Math.max(1,state.qty+d);
document.getElementById('qty-display').innerText=state.qty;
}

function addToCart(){
const item=state.currentItem;
const exist=state.cart.find(i=>i.name===item.name);
if(exist) exist.qty+=state.qty;
else state.cart.push({...item,qty:state.qty});
goTo('screen-items');
}

function calcTotal(){
let t=0;
state.cart.forEach(i=>{
let sub=i.price*i.qty;
let disc=sub*i.discount/100;
t+=sub-disc;
});
state.finalTotal=Math.round(t);
}

function goToPayment(){
if(state.cart.length===0){alert("Cart empty");return;}
calcTotal();
document.getElementById('pay-item').innerText=
state.cart.map(i=>i.name+" x"+i.qty).join(",");
document.getElementById('pay-total').innerText=state.finalTotal;
goTo('screen-payment');
}

function processPayment(){
const c=document.getElementById('input-card').value;
const p=document.getElementById('input-pin').value;
if(c==="12345"&&p==="1234") goTo('screen-success');
else goTo('screen-fail');
}
</script>

</body>
</html>
