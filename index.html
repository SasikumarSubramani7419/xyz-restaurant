<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XYZ Restaurant | Admin & POS Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0e0c;--surface:#1a1814;--card:#221f1a;--border:#2e2a23;--gold:#d4a847;--gold-light:#f0c96a;--red:#c94040;--green:#3a9e6f;--text:#f0ebe0;--muted:#7a7060;--radius:16px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    
    .app{position:relative;width:100%;max-width:500px;}
    .screen{display:none;animation:fadeUp 0.4s ease-out both;}
    .screen.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:25px;box-shadow:0 30px 60px rgba(0,0,0,0.5);}
    
    /* UI Components */
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-weight:600;cursor:pointer;margin-top:10px;transition:0.2s;}
    .btn-primary{background:var(--gold);color:#1a1200;}
    .btn-admin{background:#3b3b3b;color:var(--gold-light);border:1px solid var(--gold);}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
    
    input{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border);color:white;border-radius:10px;margin-bottom:10px;outline:none;}
    
    .menu-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .badge{font-size:0.6rem;padding:2px 6px;border-radius:4px;text-transform:uppercase;font-weight:bold;}
    
    /* Admin Specific */
    .admin-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .stat-card{background:var(--surface);padding:15px;border-radius:12px;border:1px solid var(--border);text-align:center;}
    .order-row{border-bottom:1px solid var(--border);padding:10px 0;font-size:0.85rem;}
    .stock-toggle{width:auto;margin:0;cursor:pointer;}
  </style>
</head>
<body>

<div class="app">
 
  <div class="screen active" id="screen-welcome">
    <div class="card" style="text-align:center;">
      <h1 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:10px;">XYZ Restaurant</h1>
      <p style="color:var(--muted); font-size:0.8rem; margin-bottom:30px;">Premium Dining Management</p>
      <button class="btn btn-primary" onclick="goTo('screen-menu')">Start Customer Order</button>
      <button class="btn btn-admin" onclick="goTo('screen-login')">Staff Login</button>
    </div>
  </div>

  <div class="screen" id="screen-login">
    <div class="card">
      <h3 style="margin-bottom:15px;">Admin Access</h3>
      <input type="text" id="login-user" placeholder="Username (admin)">
      <input type="password" id="login-pass" placeholder="Password (9999)">
      <button class="btn btn-primary" onclick="authAdmin()">Login</button>
      <button class="btn btn-ghost" onclick="goTo('screen-welcome')">Back</button>
    </div>
  </div>

  <div class="screen" id="screen-admin">
    <div class="card">
      <h2 style="color:var(--gold); margin-bottom:15px;">Dashboard</h2>
      <div class="admin-stat-grid">
        <div class="stat-card"><small>Total Revenue</small><div id="admin-revenue" style="font-size:1.2rem; color:var(--green);">₹0</div></div>
        <div class="stat-card"><small>Orders</small><div id="admin-count" style="font-size:1.2rem;">0</div></div>
      </div>
      
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button class="btn btn-primary" onclick="showAdminTab('orders')" style="margin:0">Live Orders</button>
        <button class="btn btn-ghost" onclick="showAdminTab('menu')" style="margin:0">Edit Menu</button>
      </div>

      <div id="admin-content" style="max-height:300px; overflow-y:auto;">
        </div>

      <button class="btn btn-ghost" onclick="location.reload()">Logout</button>
    </div>
  </div>

  <div class="screen" id="screen-menu">
    <div class="card">
      <h3 style="margin-bottom:15px;">Choose Category</h3>
      <div class="menu-item" onclick="openMenu('veg')" style="cursor:pointer;">🥗 <b>Vegetarian</b> <span>➔</span></div>
      <div class="menu-item" onclick="openMenu('nonveg')" style="cursor:pointer;">🍗 <b>Non-Vegetarian</b> <span>➔</span></div>
      <button class="btn btn-ghost" onclick="goTo('screen-welcome')">Back</button>
    </div>
  </div>

  <div class="screen" id="screen-items">
    <div class="card">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <button onclick="goTo('screen-menu')" style="background:none; border:none; color:var(--gold); cursor:pointer">← Back</button>
        <b id="cat-title">MENU</b>
      </div>
      <div id="items-list"></div>
      <button class="btn btn-primary" id="go-cart" onclick="goTo('screen-cart')" style="display:none;">View Cart</button>
    </div>
  </div>

  <div class="screen" id="screen-cart">
    <div class="card">
      <h3>Review Order</h3>
      <div id="cart-review-list" style="margin:15px 0;"></div>
      <div id="cart-total" style="font-weight:bold; border-top:1px solid var(--border); padding-top:10px; color:var(--gold);"></div>
      <button class="btn btn-primary" onclick="processOrder()">Confirm & Pay</button>
      <button class="btn btn-ghost" onclick="goTo('screen-items')">Add More</button>
    </div>
  </div>

</div>

<script>
  // --- DATABASE ---
  let MENU_DATA = JSON.parse(localStorage.getItem('admin_menu')) || {
    veg: [
      { id: 1, name: 'Idli', price: 40, inStock: true },
      { id: 2, name: 'Dosa', price: 80, inStock: true }
    ],
    nonveg: [
      { id: 3, name: 'Biryani', price: 200, inStock: true },
      { id: 4, name: 'Chicken 65', price: 150, inStock: true }
    ]
  };

  let orders = JSON.parse(localStorage.getItem('all_orders')) || [];
  let cart = [];
  let currentCat = '';

  // --- NAVIGATION ---
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // --- ADMIN LOGIC ---
  function authAdmin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    if(user === 'admin' && pass === '9999') {
      goTo('screen-admin');
      showAdminTab('orders');
    } else {
      alert("Invalid Staff Credentials");
    }
  }

  function showAdminTab(tab) {
    const content = document.getElementById('admin-content');
    const rev = orders.reduce((s, o) => s + o.total, 0);
    document.getElementById('admin-revenue').textContent = `₹${rev}`;
    document.getElementById('admin-count').textContent = orders.length;

    if(tab === 'orders') {
      content.innerHTML = '<h4>Active Orders</h4>';
      orders.slice().reverse().forEach((o, i) => {
        content.innerHTML += `
          <div class="order-row">
            <b>Order #${o.id}</b> - ₹${o.total}<br>
            <small>${o.items.map(item => item.name).join(', ')}</small>
          </div>`;
      });
    } else {
      content.innerHTML = '<h4>Edit Prices / Stock</h4>';
      [...MENU_DATA.veg, ...MENU_DATA.nonveg].forEach(item => {
        content.innerHTML += `
          <div class="menu-item">
            <span>${item.name}</span>
            <input type="number" value="${item.price}" style="width:60px; margin:0 5px;" onchange="updatePrice(${item.id}, this.value)">
            <input type="checkbox" ${item.inStock ? 'checked' : ''} onclick="toggleStock(${item.id})">
          </div>`;
      });
    }
  }

  function updatePrice(id, newPrice) {
    [...MENU_DATA.veg, ...MENU_DATA.nonveg].find(i => i.id === id).price = parseInt(newPrice);
    localStorage.setItem('admin_menu', JSON.stringify(MENU_DATA));
  }

  function toggleStock(id) {
    const item = [...MENU_DATA.veg, ...MENU_DATA.nonveg].find(i => i.id === id);
    item.inStock = !item.inStock;
    localStorage.setItem('admin_menu', JSON.stringify(MENU_DATA));
  }

  // --- CUSTOMER LOGIC ---
  function openMenu(cat) {
    currentCat = cat;
    document.getElementById('cat-title').textContent = cat.toUpperCase();
    renderItems();
    goTo('screen-items');
  }

  function renderItems() {
    const list = document.getElementById('items-list');
    list.innerHTML = '';
    MENU_DATA[currentCat].forEach(item => {
      list.innerHTML += `
        <div class="menu-item" style="${!item.inStock ? 'opacity:0.5' : ''}">
          <div><b>${item.name}</b><br><small>₹${item.price}</small></div>
          ${item.inStock ? 
            `<button class="add-btn" onclick="addToCart(${item.id})">ADD</button>` : 
            `<span style="color:var(--red); font-size:0.7rem;">SOLD OUT</span>`}
        </div>`;
    });
  }

  function addToCart(id) {
    const item = [...MENU_DATA.veg, ...MENU_DATA.nonveg].find(i => i.id === id);
    cart.push(item);
    document.getElementById('go-cart').style.display = 'block';
    alert(`${item.name} added to cart!`);
  }

  function processOrder() {
    const total = cart.reduce((s, i) => s + i.price, 0);
    const newOrder = {
      id: Math.floor(1000 + Math.random() * 9000),
      items: cart,
      total: total,
      time: new Date().toLocaleTimeString()
    };
    orders.push(newOrder);
    localStorage.setItem('all_orders', JSON.stringify(orders));
    alert(`Order #${newOrder.id} Placed Successfully!`);
    cart = [];
    goTo('screen-welcome');
  }
</script>

</body>
</html>
