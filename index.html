<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XYZ Restaurant | Full Enterprise POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0e0c;--surface:#1a1814;--card:#221f1a;--border:#2e2a23;--gold:#d4a847;--gold-light:#f0c96a;--red:#c94040;--green:#3a9e6f;--blue:#4a90e2;--text:#f0ebe0;--muted:#7a7060;--radius:16px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    
    .app{position:relative;width:100%;max-width:600px;}
    .screen{display:none;animation:fadeUp 0.3s ease-out;}
    .screen.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:25px;box-shadow:0 30px 60px rgba(0,0,0,0.5);}
    
    /* Global UI */
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-weight:600;cursor:pointer;margin-top:10px;transition:0.2s;}
    .btn-primary{background:var(--gold);color:#1a1200;}
    .btn-success{background:var(--green);color:white;}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
    
    /* Kitchen Display System (KDS) */
    .kds-grid{display:grid;grid-template-columns:1fr;gap:15px;max-height:500px;overflow-y:auto;}
    .kds-card{background:var(--surface);border-left:5px solid var(--red);padding:15px;border-radius:10px;border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
    .kds-card.preparing{border-left-color:var(--gold);}
    .kds-item-list{margin:10px 0;padding-left:20px;font-size:0.9rem;color:var(--gold-light);}
    
    /* Stats */
    .stat-bar{display:flex;justify-content:space-between;background:var(--surface);padding:10px 20px;border-radius:10px;margin-bottom:20px;border:1px solid var(--border);}
    
    .menu-item{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    input{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border);color:white;border-radius:10px;margin-bottom:10px;}
  </style>
</head>
<body>

<div class="app">
 
  <div class="screen active" id="screen-home">
    <div class="card" style="text-align:center;">
      <h1 style="font-family:'Playfair Display'; color:var(--gold); font-size:2.2rem;">XYZ System</h1>
      <p style="color:var(--muted); margin-bottom:30px;">Select Terminal Mode</p>
      <button class="btn btn-primary" onclick="goTo('screen-customer')">🛒 Customer Menu</button>
      <button class="btn btn-outline" onclick="goTo('screen-admin')">📊 Admin Dashboard</button>
      <button class="btn btn-outline" onclick="renderKDS(); goTo('screen-kitchen')">👨‍🍳 Kitchen View</button>
    </div>
  </div>

  <div class="screen" id="screen-kitchen">
    <div class="card" style="max-width:100%;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--gold);">Live Kitchen</h2>
        <button class="btn btn-outline" style="width:auto; margin:0;" onclick="goTo('screen-home')">Exit</button>
      </div>
      <div class="kds-grid" id="kds-list">
        </div>
    </div>
  </div>

  <div class="screen" id="screen-admin">
    <div class="card">
      <h2 style="color:var(--gold); margin-bottom:15px;">Admin Panel</h2>
      <div class="stat-bar">
        <span>Revenue: <b id="rev-val" style="color:var(--green)">₹0</b></span>
        <span>Orders: <b id="ord-val">0</b></span>
      </div>
      <div id="admin-orders" style="max-height:300px; overflow-y:auto; margin-bottom:15px;"></div>
      <button class="btn btn-outline" onclick="goTo('screen-home')">Back to Home</button>
    </div>
  </div>

  <div class="screen" id="screen-customer">
    <div class="card">
      <h2 style="margin-bottom:20px;">Your Order</h2>
      <div id="cust-menu">
        <div class="menu-item" onclick="addToCart('Paneer Tikka', 250)">🧀 Paneer Tikka <span>₹250</span></div>
        <div class="menu-item" onclick="addToCart('Chicken Biryani', 350)">🍛 Chicken Biryani <span>₹350</span></div>
        <div class="menu-item" onclick="addToCart('Soft Drink', 60)">🥤 Soft Drink <span>₹60</span></div>
      </div>
      <div id="cart-box" style="margin-top:20px; border-top:1px solid var(--border); padding-top:10px; display:none;">
        <p>Items in Cart: <b id="cart-count">0</b></p>
        <button class="btn btn-primary" onclick="submitOrder()">Place Order</button>
      </div>
      <button class="btn btn-outline" onclick="goTo('screen-home')">Cancel</button>
    </div>
  </div>

</div>

<script>
  // Shared State
  let orders = JSON.parse(localStorage.getItem('restaurant_orders')) || [];
  let cart = [];

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'screen-admin') renderAdmin();
  }

  // Customer Logic
  function addToCart(name, price) {
    cart.push({ name, price });
    document.getElementById('cart-box').style.display = 'block';
    document.getElementById('cart-count').textContent = cart.length;
  }

  function submitOrder() {
    const total = cart.reduce((s, i) => s + i.price, 0);
    const newOrder = {
      id: Math.floor(100 + Math.random() * 900),
      items: cart,
      total: total,
      status: 'Pending', // Pending -> Preparing -> Ready
      timestamp: new Date().toLocaleTimeString()
    };
    orders.push(newOrder);
    save();
    cart = [];
    document.getElementById('cart-box').style.display = 'none';
    alert("Order Sent to Kitchen!");
    goTo('screen-home');
  }

  // Kitchen Logic
  function renderKDS() {
    const list = document.getElementById('kds-list');
    list.innerHTML = '';
    const activeOrders = orders.filter(o => o.status !== 'Ready');
    
    if(activeOrders.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:var(--muted)">No pending orders. Take a break, Chef!</p>';
      return;
    }

    activeOrders.forEach(o => {
      list.innerHTML += `
        <div class="kds-card ${o.status === 'Preparing' ? 'preparing' : ''}">
          <div style="display:flex; justify-content:space-between;">
            <b>Order #${o.id}</b>
            <span class="badge" style="color:var(--muted)">${o.timestamp}</span>
          </div>
          <ul class="kds-item-list">
            ${o.items.map(i => `<li>${i.name}</li>`).join('')}
          </ul>
          <div style="display:flex; gap:10px;">
            ${o.status === 'Pending' ? 
              `<button class="btn btn-primary" style="font-size:0.8rem" onclick="updateStatus(${o.id}, 'Preparing')">Start Cooking</button>` : 
              `<button class="btn btn-success" style="font-size:0.8rem" onclick="updateStatus(${o.id}, 'Ready')">Mark as Ready</button>`
            }
          </div>
        </div>
      `;
    });
  }

  function updateStatus(id, newStatus) {
    const order = orders.find(o => o.id === id);
    if(order) order.status = newStatus;
    save();
    renderKDS();
  }

  // Admin Logic
  function renderAdmin() {
    const rev = orders.filter(o => o.status === 'Ready').reduce((s, o) => s + o.total, 0);
    document.getElementById('rev-val').textContent = `₹${rev}`;
    document.getElementById('ord-val').textContent = orders.length;
    
    const list = document.getElementById('admin-orders');
    list.innerHTML = '<h4>Order History</h4>';
    orders.slice().reverse().forEach(o => {
      list.innerHTML += `
        <div class="menu-item" style="font-size:0.8rem">
          <span>#${o.id} - ${o.status}</span>
          <b style="color:${o.status === 'Ready' ? 'var(--green)' : 'var(--gold)'}">₹${o.total}</b>
        </div>
      `;
    });
  }

  function save() {
    localStorage.setItem('restaurant_orders', JSON.stringify(orders));
  }

</script>

</body>
</html>
