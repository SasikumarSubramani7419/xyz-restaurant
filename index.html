<script>

const MENU = {
  veg:[
    {name:'Idli',emoji:'🫓',price:20, tag:'all',desc:'Soft steamed rice cakes',discount:0},
    {name:'Dosa',emoji:'🥞',price:20, tag:'all',desc:'Crispy rice & lentil crepe',discount:0},
    {name:'Vada',emoji:'🍩',price:25, tag:'snacks',desc:'Crunchy lentil doughnuts',discount:10},
    {name:'Paneer Butter Masala',emoji:'🧀',price:120, tag:'main',desc:'Creamy tomato paneer curry',discount:0},
    {name:'Chapati',emoji:'🫓',price:15, tag:'main',desc:'Soft whole wheat flatbread',discount:10},
    {name:'Fried Rice',emoji:'🍚',price:80, tag:'rice',desc:'Veg fried rice',discount:0},
  ],
  nonveg:[
    {name:'Chicken Biryani',emoji:'🍛',price:120, tag:'biryani',desc:'Chicken biryani',discount:20},
    {name:'Mutton Biryani',emoji:'🥘',price:200, tag:'biryani',desc:'Mutton biryani',discount:20},
    {name:'Fish Curry',emoji:'🐟',price:150, tag:'curry',desc:'Fish curry',discount:15},
    {name:'Egg Fried Rice',emoji:'🍳',price:90, tag:'rice',desc:'Egg rice',discount:0},
    {name:'Chicken Curry',emoji:'🍲',price:140, tag:'curry',desc:'Chicken curry',discount:0},
    {name:'Chicken Fried Rice',emoji:'🍗',price:110, tag:'rice',desc:'Chicken rice',discount:0},
  ],
};

const TAGS={veg:['all','snacks','main','rice'],nonveg:['all','biryani','curry','rice']};

const state={
  category:'',
  cart:[],
  currentItem:null,
  qty:1,
  finalTotal:0,
  activeTag:'all'
};

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function handlePress5(){ goTo('screen-menu'); }

function selectCategory(cat){
  state.category=cat;
  state.activeTag='all';
  buildFilterTabs(cat);
  renderItems(MENU[cat]);
  goTo('screen-items');
}

function buildFilterTabs(cat){
  const wrap=document.getElementById('filter-tabs');
  wrap.innerHTML='';
  TAGS[cat].forEach(tag=>{
    const btn=document.createElement('button');
    btn.className='filter-tab'+(tag==='all'?' active':'');
    btn.textContent=tag;
    btn.onclick=()=>{
      state.activeTag=tag;
      filterItems();
    };
    wrap.appendChild(btn);
  });
}

function filterItems(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const items=MENU[state.category].filter(i=>{
    return (state.activeTag==='all'||i.tag===state.activeTag)
    && (i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
  });
  renderItems(items);
}

function renderItems(items){
  const grid=document.getElementById('items-grid');
  grid.innerHTML='';
  items.forEach(item=>{
    const el=document.createElement('div');
    el.className='menu-item';
    el.innerHTML=`
      <div class="item-left">
        <span class="item-emoji">${item.emoji}</span>
        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
          ${item.discount>0?`<span class="offer-tag">🔥 ${item.discount}% OFF</span>`:''}
        </div>
      </div>
      <span class="item-price">₹${item.price}</span>`;
    el.onclick=()=>selectItem(item);
    grid.appendChild(el);
  });
}

function selectItem(item){
  state.currentItem=item;
  state.qty=1;
  document.getElementById('prep-emoji').textContent=item.emoji;
  document.getElementById('prep-name').textContent=item.name;
  goTo('screen-qty');
  updateQtyUI();
}

function changeQty(d){
  state.qty=Math.max(1,state.qty+d);
  updateQtyUI();
}

function updateQtyUI(){
  document.getElementById('qty-display').textContent=state.qty;
}

function addToCart(){
  const item=state.currentItem;
  const exist=state.cart.find(i=>i.name===item.name);
  if(exist) exist.qty+=state.qty;
  else state.cart.push({...item,qty:state.qty});
  goTo('screen-items');
}

function calculateCartTotal(){
  let total=0;
  state.cart.forEach(i=>{
    let sub=i.price*i.qty;
    let disc=sub*i.discount/100;
    total+=sub-disc;
  });
  state.finalTotal=Math.round(total);
}

function goToPayment(){
  if(state.cart.length===0){
    alert("Cart Empty");
    return;
  }
  calculateCartTotal();
  document.getElementById('pay-item').textContent=
    state.cart.map(i=>`${i.name} x${i.qty}`).join(", ");
  document.getElementById('pay-total').textContent=`₹${state.finalTotal}`;
  goTo('screen-payment');
}

function processPayment(){
  const name=document.getElementById('input-name').value;
  const card=document.getElementById('input-card').value;
  const pin=document.getElementById('input-pin').value;

  if(!name || !card || !pin){
    document.getElementById('pay-error').style.display='block';
    return;
  }

  if(card==="12345" && pin==="1234"){
    goTo('screen-success');
  } else {
    goTo('screen-fail');
  }
}

function resetApp(){
  state.cart=[];
  goTo('screen-welcome');
}

</script>
