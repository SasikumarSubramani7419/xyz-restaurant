<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XYZ Restaurant | Ultimate Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0e0c;--surface:#1a1814;--card:#221f1a;--border:#2e2a23;--gold:#d4a847;--gold-light:#f0c96a;--red:#c94040;--green:#3a9e6f;--text:#f0ebe0;--muted:#7a7060;--radius:16px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden;}
    
    /* Background Glows */
    body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(120px);opacity:0.1;pointer-events:none;z-index:0;}
    body::before{width:600px;height:600px;background:var(--gold);top:-200px;left:-200px;}
    body::after{width:500px;height:500px;background:#c94040;bottom:-150px;right:-150px;}
    
    .app{position:relative;z-index:1;width:100%;max-width:520px;}
    .screen{display:none;animation:fadeUp 0.4s cubic-bezier(.22,.68,0,1.2) both;}
    .screen.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:30px;box-shadow:0 32px 80px rgba(0,0,0,.6);position:relative;}
    
    /* Header Styles */
    .logo-wrap{text-align:center;margin-bottom:20px;}
    .restaurant-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--gold);}
    
    /* Cart Floating Button */
    .cart-btn-float{position:fixed;bottom:30px;right:30px;background:var(--gold);color:#1a1200;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 8px 25px rgba(212,168,71,0.4);cursor:pointer;z-index:100;transition:0.3s;}
    .cart-count-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:white;font-size:0.7rem;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid var(--bg);}

    /* Search Bar */
    .search-box{width:100%;background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:10px;color:var(--text);margin-bottom:15px;outline:none;}
    .search-box:focus{border-color:var(--gold);}

    /* Menu Items */
    .menu-grid{display:grid;gap:12px;max-height:400px;overflow-y:auto;padding-right:5px;}
    .menu-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;display:flex;align-items:center;justify-content:space-between;transition:0.2s;}
    .item-info b{display:block;font-size:1rem;}
    .item-info small{color:var(--muted);font-size:0.75rem;}
    
    /* Controls */
    .add-btn{background:var(--gold);border:none;color:#1a1200;padding:8px 16px;border-radius:8px;font-weight:bold;cursor:pointer;}
    .qty-controls{display:flex;align-items:center;gap:12px;background:var(--bg);padding:5px 10px;border-radius:8px;border:1px solid var(--border);}
    .qty-btn{background:none;border:none;color:var(--gold);font-size:1.2rem;cursor:pointer;font-weight:bold;}

    /* Utility */
    .btn{width:100%;padding:15px;border-radius:12px;border:none;font-weight:600;cursor:pointer;margin-top:10px;transition:0.2s;}
    .btn-primary{background:linear-gradient(135deg,var(--gold),#b8902e);color:#1a1200;}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
    .summary-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;margin:15px 0;}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:0.9rem;}
    .total-row{border-top:1px solid var(--border);padding-top:10px;margin-top:10px;font-weight:bold;font-size:1.1rem;color:var(--gold-light);}
    
    .cat-card{background:var(--surface);border:1px solid var(--border);padding:20px;border-radius:12px;margin-bottom:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
    input[type="text"], input[type="password"] { width:100%; padding:12px; background:var(--surface); border:1px solid var(--border); color:white; border-radius:8px; margin-top:5px; margin-bottom:15px;}
  </style>
</head>
<body>

<div class="cart-btn-float" id="cart-trigger" onclick="goTo('screen-cart')" style="display:none;">
  🛒<div class="cart-count-badge" id="cart-count">0</div>
</div>

<div class="app">
 
  <div class="screen active" id="screen-welcome">
    <div class="card" style="text-align:center;">
      <div class="logo-wrap">
        <span style="font-size:3rem">🍽️</span>
        <div class="restaurant-name">XYZ Restaurant</div>
        <p style="color:var(--muted); letter-spacing:2px; font-size:0.7rem">PREMIUM DINING</p>
      </div>
      <button class="btn btn-primary" onclick="goTo('screen-menu')" style="width:80px; height:80px; border-radius:50%; font-size:1.5rem;">5</button>
      <p style="margin-top:20px; color:var(--muted)">Press 5 to start your order</p>
    </div>
  </div>
 
  <div class="screen" id="screen-menu">
    <div class="card">
      <h3 style="margin-bottom:20px; font-family:'Playfair Display'">Select Menu</h3>
      <div class="cat-card" onclick="openMenu('veg')">
        <span>🥗 <b>Vegetarian</b></span><span style="color:var(--green)">●</span>
      </div>
      <div class="cat-card" onclick="openMenu('nonveg')">
        <span>🍗 <b>Non-Vegetarian</b></span><span style="color:var(--red)">●</span>
      </div>
      <button class="btn btn-ghost" onclick="goTo('screen-welcome')">Back</button>
    </div>
  </div>
 
  <div class="screen" id="screen-items">
    <div class="card">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <button onclick="goTo('screen-menu')" style="background:none; border:none; color:var(--gold); cursor:pointer">← Back</button>
        <b id="cat-label" style="color:var(--gold)">Menu</b>
      </div>
      <input type="text" class="search-box" id="item-search" placeholder="Search for dishes..." oninput="filterSearch()">
      <div class="menu-grid" id="items-grid"></div>
    </div>
  </div>
 
  <div class="screen" id="screen-cart">
    <div class="card">
      <h3 style="margin-bottom:15px; font-family:'Playfair Display'">Review Order</h3>
      <div id="cart-list" style="max-height:200px; overflow-y:auto"></div>
      <div class="summary-box" id="cart-summary"></div>
      <button class="btn btn-primary" onclick="goTo('screen-payment')">Proceed to Pay</button>
      <button class="btn btn-ghost" onclick="goTo('screen-items')">Add More Items</button>
    </div>
  </div>

  <div class="screen" id="screen-payment">
    <div class="card">
      <h3 style="margin-bottom:15px;">Payment Details</h3>
      <label>Name</label><input type="text" id="p-name" placeholder="Your Name">
      <label>Card (12345)</label><input type="text" id="p-card" placeholder="12345">
      <label>PIN (1234)</label><input type="password" id="p-pin" placeholder="1234">
      <button class="btn btn-primary" id="pay-btn" onclick="handlePayment()">Confirm Payment</button>
      <button class="btn btn-ghost" onclick="goTo('screen-cart')">Cancel</button>
    </div>
  </div>

  <div class="screen" id="screen-success">
    <div class="card" style="text-align:center;">
      <span style="font-size:3rem">✅</span>
      <h2 style="color:var(--green); margin:10px 0;">Order Confirmed!</h2>
      <div id="receipt-data"></div>
      <button class="btn btn-primary" onclick="location.reload()">Done</button>
    </div>
  </div>

</div>

<script>
  // MENU DATABASE
  const DATA = {
    veg: [
      { id: 1, name: 'Idli (2pcs)', price: 40, emoji: '🫓' },
      { id: 2, name: 'Masala Dosa', price: 80, emoji: '🥞' },
      { id: 3, name: 'Medu Vada', price: 50, emoji: '🍩' },
      { id: 4, name: 'Paneer Tikka', price: 180, emoji: '🧀' }
    ],
    nonveg: [
      { id: 5, name: 'Chicken Biryani', price: 220, emoji: '🍛' },
      { id: 6, name: 'Mutton Curry', price: 350, emoji: '🥘' },
      { id: 7, name: 'Fish Fry', price: 280, emoji: '🐟' },
      { id: 8, name: 'Egg Fried Rice', price: 120, emoji: '🍳' }
    ]
  };

  let cart = JSON.parse(localStorage.getItem('restaurant_cart')) || [];
  let currentCategory = 'veg';

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    updateUI();
  }

  function openMenu(cat) {
    currentCategory = cat;
    document.getElementById('cat-label').textContent = cat === 'veg' ? 'VEGETARIAN' : 'NON-VEGETARIAN';
    filterSearch();
    goTo('screen-items');
  }

  function filterSearch() {
    const query = document.getElementById('item-search').value.toLowerCase();
    const grid = document.getElementById('items-grid');
    grid.innerHTML = '';
    
    DATA[currentCategory].forEach(item => {
      if (item.name.toLowerCase().includes(query)) {
        const cartItem = cart.find(c => c.id === item.id);
        const qty = cartItem ? cartItem.qty : 0;
        
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = `
          <div class="item-info">
            <b>${item.emoji} ${item.name}</b>
            <small>₹${item.price}</small>
          </div>
          ${qty > 0 ? `
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
              <span>${qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
          ` : `
            <button class="add-btn" onclick="addToCart(${item.id})">ADD</button>
          `}
        `;
        grid.appendChild(div);
      }
    });
  }

  function addToCart(id) {
    const item = DATA[currentCategory].find(i => i.id === id);
    cart.push({ ...item, qty: 1 });
    save();
    filterSearch();
  }

  function changeQty(id, delta) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx > -1) {
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) cart.splice(idx, 1);
    }
    save();
    if (document.getElementById('screen-items').classList.contains('active')) filterSearch();
    else updateUI();
  }

  function save() {
    localStorage.setItem('restaurant_cart', JSON.stringify(cart));
    updateUI();
  }

  function updateUI() {
    const totalItems = cart.reduce((s, i) => s + i.qty, 0);
    const cartBtn = document.getElementById('cart-trigger');
    cartBtn.style.display = totalItems > 0 ? 'flex' : 'none';
    document.getElementById('cart-count').textContent = totalItems;

    if (document.getElementById('screen-cart').classList.contains('active')) {
      const list = document.getElementById('cart-list');
      const summ = document.getElementById('cart-summary');
      list.innerHTML = '';
      let sub = 0;
      
      cart.forEach(item => {
        sub += (item.price * item.qty);
        list.innerHTML += `
          <div class="menu-item" style="margin-bottom:10px">
            <span>${item.name} x ${item.qty}</span>
            <b>₹${item.price * item.qty}</b>
          </div>
        `;
      });
      
      const gst = Math.round(sub * 0.05);
      summ.innerHTML = `
        <div class="summary-row"><span>Subtotal</span><span>₹${sub}</span></div>
        <div class="summary-row"><span>GST (5%)</span><span>₹${gst}</span></div>
        <div class="summary-row total-row"><span>Total Payable</span><span>₹${sub + gst}</span></div>
      `;
    }
  }

  function handlePayment() {
    const n = document.getElementById('p-name').value;
    const c = document.getElementById('p-card').value;
    const p = document.getElementById('p-pin').value;
    const btn = document.getElementById('pay-btn');

    if (n && c === '12345' && p === '1234') {
      btn.innerHTML = "Processing...";
      btn.disabled = true;
      setTimeout(() => {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('receipt-data').innerHTML = `
          <div class="summary-box">
            <p><b>Order ID:</b> #${Math.floor(Math.random()*9999)}</p>
            <p><b>Customer:</b> ${n}</p>
            <p style="color:var(--gold); margin-top:10px"><b>Estimated Time: 20 Mins</b></p>
            <h3 style="margin-top:10px">Total Paid: ₹${Math.round(total * 1.05)}</h3>
          </div>
        `;
        cart = [];
        localStorage.removeItem('restaurant_cart');
        goTo('screen-success');
      }, 1500);
    } else {
      alert("Invalid Card Details (Use 12345 / 1234)");
    }
  }

  // Initialize
  window.onload = updateUI;
</script>

</body>
</html>
