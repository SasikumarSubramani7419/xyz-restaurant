<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYZ Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
body{background:#0f0e0c;color:#f0ebe0;font-family:'DM Sans';display:flex;justify-content:center;padding:20px}
.screen{display:none}
.screen.active{display:block}
.card{background:#1a1814;padding:25px;border-radius:12px;width:420px}
.menu-item{background:#221f1a;padding:12px;border-radius:10px;margin-bottom:8px;cursor:pointer}
.btn{background:#d4a847;color:#000;padding:12px;border:none;border-radius:10px;width:100%;margin-top:10px}
.qty-btn{padding:10px}
</style>
</head>

<body>

<div class="app">

<!-- welcome -->
<div class="screen active" id="screen-welcome">
<div class="card">
<h1>XYZ Restaurant</h1>
<button class="btn" onclick="goTo('screen-menu')">Start</button>
</div>
</div>

<!-- category -->
<div class="screen" id="screen-menu">
<div class="card">
<h2>Select Category</h2>
<button class="btn" onclick="selectCategory('veg')">Veg</button>
<button class="btn" onclick="selectCategory('nonveg')">Non Veg</button>
</div>
</div>

<!-- items -->
<div class="screen" id="screen-items">
<div class="card">
<h2>Items</h2>
<input id="search-input" oninput="filterItems()" placeholder="search">
<div id="items-grid"></div>
<button class="btn" onclick="goTo('screen-menu')">Back</button>
</div>
</div>

<!-- qty -->
<div class="screen" id="screen-qty">
<div class="card">
<h2 id="prep-name"></h2>
<button onclick="changeQty(-1)">-</button>
<span id="qty-display">1</span>
<button onclick="changeQty(1)">+</button>
<button class="btn" onclick="addToCart()">Add To Cart</button>
</div>
</div>

<!-- payment -->
<div class="screen" id="screen-payment">
<div class="card">
<h2>Payment</h2>
<p id="pay-item"></p>
<p>Total ₹ <span id="pay-total"></span></p>
<input id="input-name" placeholder="name">
<input id="input-card" placeholder="card">
<input id="input-pin" placeholder="pin">
<button class="btn" onclick="processPayment()">Pay</button>
</div>
</div>

<div class="screen" id="screen-success">
<div class="card"><h2>Success</h2></div>
</div>

<div class="screen" id="screen-fail">
<div class="card"><h2>Failed</h2></div>
</div>

</div>

<script>
const MENU={
veg:[
{name:'Idli',price:20,discount:0},
{name:'Vada',price:25,discount:10},
{name:'Chapati',price:15,discount:10}
],
nonveg:[
{name:'Chicken Biryani',price:120,discount:20},
{name:'Fish Curry',price:150,discount:15}
]
};

const state={category:'',cart:[],currentItem:null,qty:1,finalTotal:0};

function goTo(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function selectCategory(cat){
state.category=cat;
renderItems(MENU[cat]);
goTo('screen-items');
}

function renderItems(items){
const grid=document.getElementById('items-grid');
grid.innerHTML='';
items.forEach(item=>{
let d=document.createElement('div');
d.className='menu-item';
d.innerText=item.name+" ₹"+item.price;
d.onclick=()=>selectItem(item);
grid.appendChild(d);
});
}

function filterItems(){
let q=document.getElementById('search-input').value.toLowerCase();
renderItems(MENU[state.category].filter(i=>i.name.toLowerCase().includes(q)));
}

function selectItem(item){
state.currentItem=item;
state.qty=1;
document.getElementById('prep-name').innerText=item.name;
document.getElementById('qty-display').innerText=1;
goTo('screen-qty');
}

function changeQty(d){
state.qty=Math.max(1,state.qty+d);
document.getElementById('qty-display').innerText=state.qty;
}

function addToCart(){
let item=state.currentItem;
let exist=state.cart.find(i=>i.name===item.name);
if(exist) exist.qty+=state.qty;
else state.cart.push({...item,qty:state.qty});
goTo('screen-items');
}

function calcTotal(){
let t=0;
state.cart.forEach(i=>{
let sub=i.price*i.qty;
let disc=sub*i.discount/100;
t+=sub-disc;
});
state.finalTotal=Math.round(t);
}

function goToPayment(){
if(state.cart.length===0){alert("Cart empty");return;}
calcTotal();
document.getElementById('pay-item').innerText=
state.cart.map(i=>i.name+" x"+i.qty).join(",");
document.getElementById('pay-total').innerText=state.finalTotal;
goTo('screen-payment');
}

function processPayment(){
let c=input-card.value;
let p=input-pin.value;
if(c==="12345" && p==="1234") goTo('screen-success');
else goTo('screen-fail');
}
</script>

</body>
</html>
