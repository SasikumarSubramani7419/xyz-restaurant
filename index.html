<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XYZ Restaurant | POS Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0e0c;--surface:#1a1814;--card:#221f1a;--border:#2e2a23;--gold:#d4a847;--gold-light:#f0c96a;--red:#c94040;--green:#3a9e6f;--text:#f0ebe0;--muted:#7a7060;--radius:16px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:20px;}
    
    .app{position:relative;width:100%;max-width:500px;}
    .screen{display:none;animation:fadeUp 0.3s ease-out;}
    .screen.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
    
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:25px;box-shadow:0 30px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;min-height:500px;}
    
    /* Category Tabs */
    .tabs{display:flex;gap:10px;margin-bottom:15px;}
    .tab{flex:1;padding:10px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:0.8rem;font-weight:600;}
    .tab.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,71,0.05);}

    /* Scrollable Menu Area */
    .menu-scroll{flex-grow:1;overflow-y:auto;margin-bottom:15px;padding-right:5px;}
    .menu-scroll::-webkit-scrollbar{width:4px;}
    .menu-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}

    .menu-item{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    
    /* Cart Footer */
    .cart-footer{background:var(--surface);padding:15px;border-radius:12px;border:1px solid var(--gold);margin-top:auto;}
    
    /* General UI */
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-weight:600;cursor:pointer;margin-top:10px;display:block;text-align:center;text-decoration:none;}
    .btn-primary{background:var(--gold);color:#1a1200;}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
    
    input{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border);color:white;border-radius:10px;margin-bottom:12px;outline:none;}
    label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;margin-bottom:5px;display:block;}

    .table-badge{background:var(--gold);color:#1a1200;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:bold;}
  </style>
</head>
<body>

<div class="app">
 
  <div class="screen active" id="screen-home">
    <div class="card" style="text-align:center; justify-content:center;">
      <h1 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:10px;">XYZ Restaurant</h1>
      <button class="btn btn-primary" onclick="goTo('screen-table')">New Order</button>
      <button class="btn btn-outline" onclick="goTo('screen-admin')">Admin Panel</button>
    </div>
  </div>

  <div class="screen" id="screen-table">
    <div class="card">
      <h3 style="margin-bottom:15px;">Assign Table</h3>
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:20px;">
        <button class="tab" onclick="setTable(1)">T-1</button>
        <button class="tab" onclick="setTable(2)">T-2</button>
        <button class="tab" onclick="setTable(3)">T-3</button>
      </div>
      <button class="btn btn-outline" onclick="goTo('screen-home')">Back</button>
    </div>
  </div>

  <div class="screen" id="screen-menu">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span class="table-badge" id="active-table">Table 0</span>
        <button onclick="goTo('screen-table')" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:0.8rem;">Switch Table</button>
      </div>

      <div class="tabs">
        <div class="tab active" id="tab-veg" onclick="toggleMenu('veg')">🥗 Veg</div>
        <div class="tab" id="tab-nonveg" onclick="toggleMenu('nonveg')">🍗 Non-Veg</div>
      </div>

      <div class="menu-scroll" id="menu-container">
        </div>

      <div class="cart-footer" id="cart-summary" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:8px;">
          <span>Items: <b id="cart-count">0</b></span>
          <span>Total: <b id="cart-total">₹0</b></span>
        </div>
        <button class="btn btn-primary" onclick="goTo('screen-payment')">Proceed to Payment</button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-payment">
    <div class="card">
      <h3 style="margin-bottom:20px; font-family:'Playfair Display';">Checkout</h3>
      <div style="background:var(--surface); padding:15px; border-radius:12px; margin-bottom:20px; border:1px dashed var(--gold);">
        <p style="font-size:0.8rem; color:var(--muted);">Amount to Pay</p>
        <h2 id="pay-total" style="color:var(--gold);">₹0</h2>
      </div>
      
      <label>Customer Name</label>
      <input type="text" id="cust-name" placeholder="Enter name">
      
      <label>Payment Method</label>
      <select style="width:100%; padding:12px; background:var(--surface); color:white; border:1px solid var(--border); border-radius:10px; margin-bottom:15px;">
        <option>Cash</option>
        <option>UPI / QR Code</option>
        <option>Card</option>
      </select>

      <button class="btn btn-primary" onclick="finishOrder()">Complete Order</button>
      <button class="btn btn-outline" onclick="goTo('screen-menu')">Back to Menu</button>
    </div>
  </div>

</div>

<script>
  const MENU = {
    veg: [
      { id: 1, name: 'Paneer Tikka', price: 250 },
      { id: 2, name: 'Masala Dosa', price: 90 },
      { id: 3, name: 'Veg Biryani', price: 180 }
    ],
    nonveg: [
      { id: 4, name: 'Chicken Biryani', price: 280 },
      { id: 5, name: 'Butter Chicken', price: 320 },
      { id: 6, name: 'Egg Fried Rice', price: 140 }
    ]
  };

  let cart = [];
  let selectedTable = 0;
  let currentCategory = 'veg';

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'screen-menu') renderMenu();
    if(id === 'screen-payment') document.getElementById('pay-total').textContent = '₹' + calculateTotal();
  }

  function setTable(num) {
    selectedTable = num;
    document.getElementById('active-table').textContent = 'Table ' + num;
    goTo('screen-menu');
  }

  function toggleMenu(cat) {
    currentCategory = cat;
    document.getElementById('tab-veg').classList.toggle('active', cat === 'veg');
    document.getElementById('tab-nonveg').classList.toggle('active', cat === 'nonveg');
    renderMenu();
  }

  function renderMenu() {
    const container = document.getElementById('menu-container');
    container.innerHTML = '';
    MENU[currentCategory].forEach(item => {
      container.innerHTML += `
        <div class="menu-item">
          <div><b>${item.name}</b><br><small>₹${item.price}</small></div>
          <button class="btn btn-primary" style="width:auto; margin:0; padding:6px 12px; font-size:0.75rem;" onclick="addToCart('${item.name}', ${item.price})">Add</button>
        </div>`;
    });
  }

  function addToCart(name, price) {
    cart.push({ name, price });
    updateCartUI();
  }

  function updateCartUI() {
    const footer = document.getElementById('cart-summary');
    if(cart.length > 0) {
      footer.style.display = 'block';
      document.getElementById('cart-count').textContent = cart.length;
      document.getElementById('cart-total').textContent = '₹' + calculateTotal();
    }
  }

  function calculateTotal() {
    return cart.reduce((s, i) => s + i.price, 0);
  }

  function finishOrder() {
    const name = document.getElementById('cust-name').value;
    if(!name) { alert("Please enter customer name"); return; }
    
    alert(`Order for ${name} at Table ${selectedTable} has been successfully completed!`);
    
    // Reset
    cart = [];
    document.getElementById('cust-name').value = '';
    document.getElementById('cart-summary').style.display = 'none';
    goTo('screen-home');
  }
</script>

</body>
</html>
